name: ${project.name}
version: ${project.version}
author: ${author}
description: Drizzy Practice Core Plugin
main: lol.siwoo.drizzyPracticeCore.DrizzyPracticeCore
load: POSTWORLD
website: siwoo.lol

api-version: 1.8.8

libraries:
  - org.openjdk.nashorn:nashorn-core:15.4

softdepend: [ Luckperms, Multiverse-Core ]

permissions:
  drizzypracticecore.admin:
    description: "Literally Admin"
    default: op
    children:
      drizzypracticecore.fly: true
  drizzypracticecore.fly:
    description: "Allows You To Fly in the Lobby"

commands:
  fly:
    description: "Allows You To Fly"
    usage: /fly